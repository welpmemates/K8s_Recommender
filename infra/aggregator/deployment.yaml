apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
        - name: aggregator
          image: aggregator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: yaml-output
              mountPath: /mnt/aggregator-output
      volumes:
        - name: yaml-output
          hostPath:
            path: /mnt/aggregator-output
            type: DirectoryOrCreate
